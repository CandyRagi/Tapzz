<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapTheHuzz</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="description" content="Share your socials with a single tap.">
    <meta property="og:title" content="TapTheHuzz">
    <meta property="og:image" content="assets/logo.png">
</head>

<body>
    <div class="background-glow"></div>

    <main class="container">
        <header class="hero">
            <div class="logo-wrapper">
                <img src="assets/logo.png" alt="TapTheHuzz Logo" class="logo">
            </div>
            <h1 class="title">TapTheHuzz</h1>
            <p class="subtitle">The ultimate NFC social sharing tool.</p>

            <a href="TapTheHuzz.apk" class="cta-button" download>
                <span class="icon">↓</span> Download APK
            </a>
        </header>

        <section class="content-card">
            <h2>Create Your Card</h2>
            <div class="steps-grid">
                <div class="step-item">
                    <span class="step-num">01</span>
                    <h3>Launch</h3>
                    <p>Open the app and tap the <strong>+</strong> button.</p>
                </div>
                <div class="step-item">
                    <span class="step-num">02</span>
                    <h3>Link</h3>
                    <p>Copy <strong>Instagram Link</strong> and paste it into the app.</p>
                </div>
                <div class="step-item">
                    <span class="step-num">03</span>
                    <h3>Share</h3>
                    <p>Create Card and Tap your phone to another device to connect instantly.</p>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2025 TapTheHuzz</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
